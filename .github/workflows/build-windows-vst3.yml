name: Build Windows VST3

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    name: Noisemaker VST3
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: "17.0"

      - name: Verify Visual Studio
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest `
            -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Collect VST3
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $bundle = Get-ChildItem -Path build -Recurse -Directory -Filter "Noisemaker.vst3" | Select-Object -First 1
          if (-not $bundle) {
            throw "Noisemaker.vst3 bundle folder was not found after build."
          }
          Copy-Item -Path $bundle.FullName -Destination artifacts -Recurse

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: Noisemaker-Windows-VST3
          path: artifacts
